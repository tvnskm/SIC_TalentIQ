{% extends "hr/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle"></i> Confirm Deletion</div>
      <div class="card-body text-center py-5">
        <h4 class="mb-4">Are you sure you want to delete <strong>{{ object.name }}</strong>?</h4>
        <p class="text-muted">This action cannot be undone. All associated skills, certifications, and job matches will be permanently removed.</p>
        <form method="post" class="mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 me-2"><i class="bi bi-trash"></i> Yes, Delete Candidate</button>
          <a href="{% url 'candidates:detail' object.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
